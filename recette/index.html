<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Recettes de Valentin</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Les Recettes de Valentin</h1>
      <p class="subtitle">100 recettes simples, équilibrées et pas chères · Prix parisiens</p>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Rechercher une recette..." autocomplete="off">
      </div>
      <div class="filters" id="filters"></div>
      <div class="controls">
        <select id="budget" aria-label="Filtrer par budget">
          <option value="0">Tous les budgets</option>
          <option value="3">≤ 3 €</option>
          <option value="5">≤ 5 €</option>
        </select>
        <select id="maxtime" aria-label="Filtrer par temps">
          <option value="0">Tous les temps</option>
          <option value="15">≤ 15 min</option>
          <option value="30">≤ 30 min</option>
        </select>
        <select id="sort" aria-label="Trier les recettes">
          <option value="default">Trier</option>
          <option value="price">Prix croissant</option>
          <option value="time">Temps croissant</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <div id="grid" class="recipe-grid"></div>
  </main>

  <!-- Barre panier (sélection de la semaine) -->
  <button id="cart-bar" class="cart-bar hidden" onclick="openSheet()" aria-label="Voir ma liste de courses">
    <span class="cart-icon">🛒</span>
    <span id="cart-summary" class="cart-summary"></span>
    <span class="cart-cta">Ma liste →</span>
  </button>

  <!-- Feuille liste de courses cumulée -->
  <div id="sheet" class="sheet hidden">
    <div class="sheet-overlay" onclick="closeSheet()"></div>
    <div class="sheet-content" role="dialog" aria-label="Ma liste de courses">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h2>Ma semaine</h2>
        <button class="close-btn" onclick="closeSheet()" aria-label="Fermer">×</button>
      </div>
      <div id="sheet-body"></div>
    </div>
  </div>

  <!-- Modal detail -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
