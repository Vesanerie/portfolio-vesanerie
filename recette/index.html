<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Recettes de Valentin</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Les Recettes de Valentin</h1>
      <p class="subtitle">100 recettes simples, équilibrées et pas chères · Prix parisiens</p>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Rechercher une recette..." autocomplete="off">
      </div>
      <div class="filters" id="filters"></div>
    </div>
  </header>

  <main>
    <div id="grid" class="recipe-grid"></div>
  </main>

  <!-- Modal detail -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
