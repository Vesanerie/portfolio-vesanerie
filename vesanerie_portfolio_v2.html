
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #root { background: #f0ece4; font-family: 'Special Elite', serif; }
  .header-strip { background: #111; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 4px solid #111; }
  .header-name { font-family: 'Bangers', sans-serif; font-size: 38px; color: #f0ece4; letter-spacing: 5px; }
  .header-sub { font-family: 'Special Elite', serif; font-size: 11px; color: #aaa; letter-spacing: 1px; margin-top: 2px; }
  .issue-badge { font-family: 'Bangers', sans-serif; font-size: 13px; background: #f0ece4; color: #111; padding: 4px 12px; border: 2px solid #f0ece4; letter-spacing: 1px; }
  .panel-grid { display: grid; grid-template-columns: 1fr 1fr; border: 3px solid #111; }
  .panel { border: 2px solid #111; position: relative; overflow: hidden; cursor: pointer; background: #f8f5ee; transition: filter 0.12s; }
  .panel:hover { filter: brightness(0.92); }
  .panel-wide { grid-column: 1 / -1; }
  .panel-title-bar { background: #111; color: #f0ece4; font-family: 'Bangers', sans-serif; font-size: 20px; letter-spacing: 2px; padding: 5px 14px 3px; text-transform: uppercase; }
  .panel-caption { position: absolute; bottom: 0; left: 0; right: 0; background: #f8f5ee; border-top: 2px solid #111; font-size: 11px; color: #333; padding: 5px 10px; transition: background 0.1s, color 0.1s; }
  .panel:hover .panel-caption { background: #111; color: #f0ece4; }
  .speech-bubble { position: absolute; background: #f8f5ee; border: 2px solid #111; border-radius: 10px; font-family: 'Bangers', sans-serif; font-size: 12px; padding: 4px 10px; color: #111; letter-spacing: 1px; pointer-events: none; }
  .speech-bubble::after { content: ''; position: absolute; bottom: -10px; left: 14px; border: 5px solid transparent; border-top-color: #111; }
  .speech-bubble::before { content: ''; position: absolute; bottom: -7px; left: 15px; border: 4px solid transparent; border-top-color: #f8f5ee; z-index: 1; }
  .overlay-bg { display: none; min-height: 520px; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; padding: 16px; }
  .overlay-bg.open { display: flex; }
  .modal { background: #f8f5ee; border: 3px solid #111; width: min(560px, 100%); max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { background: #111; color: #f0ece4; font-family: 'Bangers', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .modal-close { cursor: pointer; font-size: 18px; background: none; border: none; color: #f0ece4; font-family: 'Bangers', sans-serif; padding: 0 4px; }
  .modal-close:hover { color: #ccc; }
  .modal-body { flex: 1; overflow-y: auto; }
  .book-page { padding: 20px 24px 16px; }
  .book-page-label { font-family: 'Bangers', sans-serif; font-size: 12px; letter-spacing: 2px; color: #888; margin-bottom: 4px; }
  .book-page-title { font-family: 'Bangers', sans-serif; font-size: 26px; letter-spacing: 2px; color: #111; margin-bottom: 10px; text-transform: uppercase; }
  .book-page-body { font-size: 13px; color: #333; line-height: 1.7; }
  .book-placeholder { width: 100%; height: 110px; margin: 12px 0; background: repeating-linear-gradient(45deg,#e0dbd0,#e0dbd0 3px,#f0ece4 3px,#f0ece4 10px); border: 2px solid #111; display: flex; align-items: center; justify-content: center; font-family: 'Bangers', sans-serif; font-size: 12px; color: #666; letter-spacing: 1px; }
  .book-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-top: 2px solid #111; flex-shrink: 0; }
  .bnav-btn { font-family: 'Bangers', sans-serif; font-size: 14px; letter-spacing: 1px; border: 2px solid #111; background: #f8f5ee; color: #111; padding: 4px 14px; cursor: pointer; text-transform: uppercase; }
  .bnav-btn:hover { background: #111; color: #f0ece4; }
  .bnav-btn:disabled { opacity: 0.25; cursor: default; }
  .page-counter { font-family: 'Bangers', sans-serif; font-size: 14px; color: #555; letter-spacing: 1px; }
  .phone-wrap { background: #111; padding: 24px 16px 20px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .phone-frame { width: 210px; border: 4px solid #333; border-radius: 28px; background: #222; padding: 10px 6px; }
  .phone-notch { width: 60px; height: 10px; background: #333; border-radius: 0 0 8px 8px; margin: 0 auto 6px; }
  .phone-screen { background: #000; border-radius: 14px; overflow: hidden; height: 360px; position: relative; }
  .phone-screen iframe { width: 100%; height: 360px; border: none; }
  .phone-swipe { display: flex; gap: 14px; align-items: center; }
  .swipe-btn { font-family: 'Bangers', sans-serif; font-size: 14px; letter-spacing: 1px; border: 2px solid #555; background: transparent; color: #aaa; padding: 4px 14px; cursor: pointer; border-radius: 4px; }
  .swipe-btn:hover { border-color: #f0ece4; color: #f0ece4; }
  .swipe-btn:disabled { opacity: 0.25; cursor: default; }
  .vid-counter { font-family: 'Bangers', sans-serif; font-size: 14px; color: #666; letter-spacing: 1px; }
  .gallery-wrap { padding: 24px; background: #f8f5ee; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .bnav-btn:disabled { opacity: 0.25; cursor: default; background: #f8f5ee; color: #111; }
</style>

<script>
const fanzines = [
  { label:"Fanzine 1 / 3", title:"Fanzine #1", ph:"[ Couverture — encre de chine, A4 ]", body:"24 pages. Espaces urbains abandonnés dessinés à l'encre de Chine avec rehauts aquarelle. Tirage limité : 50 exemplaires numérotés." },
  { label:"Fanzine 2 / 3", title:"Fanzine #2", ph:"[ Double page intérieure ]", body:"32 pages, noir & blanc. Recueil autobiographique mêlant collage et dessin au crayon." },
  { label:"Fanzine 3 / 3", title:"Fanzine #3", ph:"[ Planche — riso 2 couleurs ]", body:"20 pages risographiées. Expérimentation entre typographie et illustration." }
];

const videos = [
  { id:"7606630879707843862" },
  { id:"7606255381228031254" },
  { id:"7608205217351585027" }
];

const gallery = [
  { label:"Illustration 01", ph:"[ Tes dessins apparaîtront ici ]" },
  { label:"Illustration 02", ph:"[ Upload tes images pour les afficher ]" },
  { label:"Illustration 03", ph:"[ Couverture fanzine ]" },
  { label:"Illustration 04", ph:"[ Esquisse / croquis ]" },
  { label:"Illustration 05", ph:"[ Aquarelle / lavis ]" }
];

const about_pages = [
  { label:"Profil", title:"Vésanerie", body:"Dessinateur, vidéaste et auto-éditeur. Je crée des fanzines à tirage limité, des illustrations encre de chine, et je monte des vidéos qui documentent mon processus créatif." },
  { label:"Pratique", title:"Ce que je fais", body:"Dessin — encre de Chine, aquarelle, crayon\nFanzines & auto-édition — de la maquette à l'impression\nMontage vidéo — tournage, narration, post-prod\nDirection artistique — identité visuelle, mise en page" },
  { label:"Contact", title:"Travaillons ensemble", body:"Disponible pour commandes d'illustrations, couvertures, identités visuelles et projets éditoriaux.\n\nTikTok : @culture.hot.mag" }
];

let cur_mode='', cur_page=0, cur_vid=0, cur_img=0;

function open_modal(m){ cur_mode=m; cur_page=0; cur_vid=0; cur_img=0; render(); document.getElementById('overlay').classList.add('open'); }
function close_modal(){ document.getElementById('overlay').classList.remove('open'); }
function close_if_bg(e){ if(e.target===document.getElementById('overlay')) close_modal(); }

function render(){
  if(cur_mode==='fanzines') render_book(fanzines,'Fanzines');
  else if(cur_mode==='videos') render_videos();
  else if(cur_mode==='galerie') render_gallery();
  else if(cur_mode==='about') render_book(about_pages,'A propos');
}

function render_book(data,title){
  document.getElementById('modal-title').textContent=title.toUpperCase();
  const p=data[cur_page];
  document.getElementById('modal-body').innerHTML=`
    <div class="book-page">
      <div class="book-page-label">${p.label||''}</div>
      <div class="book-page-title">${p.title}</div>
      ${p.ph?`<div class="book-placeholder">${p.ph}</div>`:''}
      <div class="book-page-body">${p.body.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="book-nav">
      <button class="bnav-btn" onclick="bp(-1)" ${cur_page===0?'disabled':''}>&#8592; Préc.</button>
      <span class="page-counter">${cur_page+1} / ${data.length}</span>
      <button class="bnav-btn" onclick="bp(1)" ${cur_page===data.length-1?'disabled':''}>Suiv. &#8594;</button>
    </div>`;
}
function bp(d){ const data=cur_mode==='fanzines'?fanzines:about_pages; cur_page=Math.max(0,Math.min(data.length-1,cur_page+d)); render_book(data,cur_mode==='fanzines'?'Fanzines':'A propos'); }

function render_videos(){
  document.getElementById('modal-title').textContent='TIKTOK';
  const v=videos[cur_vid];
  document.getElementById('modal-body').innerHTML=`
    <div class="phone-wrap">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <iframe src="https://www.tiktok.com/embed/v2/${v.id}" allowfullscreen allow="encrypted-media autoplay"></iframe>
        </div>
      </div>
      <div class="phone-swipe">
        <button class="swipe-btn" onclick="sv(-1)" ${cur_vid===0?'disabled':''}>&#8593; Préc</button>
        <span class="vid-counter">${cur_vid+1} / ${videos.length}</span>
        <button class="swipe-btn" onclick="sv(1)" ${cur_vid===videos.length-1?'disabled':''}>Suiv &#8595;</button>
      </div>
    </div>`;
}
function sv(d){ cur_vid=Math.max(0,Math.min(videos.length-1,cur_vid+d)); render_videos(); }

function render_gallery(){
  document.getElementById('modal-title').textContent='GALERIE';
  const g=gallery[cur_img];
  const rots=[-6,-3,2,-4,5];
  let stack='';
  for(let i=gallery.length-1;i>=0;i--){
    const isTop=i===cur_img;
    const r=isTop?0:(rots[i]||0);
    const sc=isTop?1:0.93;
    stack+=`<div style="position:absolute;inset:0;
      transform:rotate(${r}deg) scale(${sc});
      border:2.5px solid #111;
      background:${isTop?'#f8f5ee':'#e0dbd0'};
      transition:transform 0.35s,opacity 0.35s;
      opacity:${isTop?1:0.7};
      display:flex;align-items:center;justify-content:center;">
      <div style="width:85%;height:75%;
        background:repeating-linear-gradient(45deg,${isTop?'#e8e3da':'#ccc8c0'},${isTop?'#e8e3da':'#ccc8c0'} 2px,${isTop?'#f8f5ee':'#e0dbd0'} 2px,${isTop?'#f8f5ee':'#e0dbd0'} 9px);
        border:1.5px solid #aaa;display:flex;align-items:center;justify-content:center;">
        ${isTop?`<span style="font-family:'Bangers',sans-serif;font-size:12px;color:#888;letter-spacing:1px;">${g.ph}</span>`:''}
      </div>
      ${isTop?`<div style="position:absolute;bottom:0;left:0;right:0;background:#111;padding:5px 12px;font-family:'Bangers',sans-serif;font-size:13px;letter-spacing:1px;color:#f0ece4;">${g.label}</div>`:''}
    </div>`;
  }
  document.getElementById('modal-body').innerHTML=`
    <div class="gallery-wrap">
      <div style="position:relative;width:280px;height:210px;margin:0 auto;">${stack}</div>
      <div class="book-nav" style="width:100%;border-top:2px solid #111;margin-top:8px;">
        <button class="bnav-btn" onclick="gi(-1)" ${cur_img===0?'disabled':''}>&#8592; Préc.</button>
        <span class="page-counter">${cur_img+1} / ${gallery.length}</span>
        <button class="bnav-btn" onclick="gi(1)" ${cur_img===gallery.length-1?'disabled':''}>Suiv. &#8594;</button>
      </div>
      <div style="font-size:11px;color:#888;font-family:serif;text-align:center;">Upload tes images pour remplacer les placeholders</div>
    </div>`;
}
function gi(d){ cur_img=Math.max(0,Math.min(gallery.length-1,cur_img+d)); render_gallery(); }
</script>
