<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vésanerie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0ece4;
      font-family: 'Special Elite', serif;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 4px solid #111;
    }
    .header-name {
      font-family: 'Bangers', sans-serif;
      font-size: clamp(28px, 6vw, 42px);
      color: #f0ece4;
      letter-spacing: 5px;
    }
    .header-sub {
      font-size: 11px;
      color: #aaa;
      letter-spacing: 1px;
      margin-top: 3px;
    }
    .issue-badge {
      font-family: 'Bangers', sans-serif;
      font-size: 13px;
      background: #f0ece4;
      color: #111;
      padding: 4px 14px;
      letter-spacing: 1px;
      border: 2px solid #f0ece4;
      white-space: nowrap;
    }

    /* GRID */
    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 3px solid #111;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (max-width: 540px) {
      .panel-grid { grid-template-columns: 1fr; }
      .panel-wide { grid-column: 1; }
    }

    .panel {
      border: 2px solid #111;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #f8f5ee;
      transition: filter 0.12s;
      min-height: 180px;
    }
    .panel:hover { filter: brightness(0.91); }
    .panel-wide { grid-column: 1 / -1; }

    .panel-title-bar {
      background: #111;
      color: #f0ece4;
      font-family: 'Bangers', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      padding: 5px 14px 3px;
    }

    .panel-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #f8f5ee;
      border-top: 2px solid #111;
      font-size: 11px;
      color: #333;
      padding: 5px 10px;
      transition: background 0.1s, color 0.1s;
    }
    .panel:hover .panel-caption { background: #111; color: #f0ece4; }

    .panel svg { display: block; width: 100%; }

    .speech-bubble {
      position: absolute;
      background: #f8f5ee;
      border: 2px solid #111;
      border-radius: 10px;
      font-family: 'Bangers', sans-serif;
      font-size: 12px;
      padding: 4px 10px;
      color: #111;
      letter-spacing: 1px;
      pointer-events: none;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px; left: 14px;
      border: 5px solid transparent;
      border-top-color: #111;
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -7px; left: 15px;
      border: 4px solid transparent;
      border-top-color: #f8f5ee;
      z-index: 1;
    }

    /* OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #f8f5ee;
      border: 3px solid #111;
      width: min(580px, 100%);
      max-height: 92vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      background: #111;
      color: #f0ece4;
      font-family: 'Bangers', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      padding: 8px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .modal-close {
      cursor: pointer;
      font-size: 20px;
      background: none;
      border: none;
      color: #f0ece4;
      font-family: 'Bangers', sans-serif;
      padding: 0 6px;
      line-height: 1;
    }
    .modal-close:hover { color: #bbb; }
    .modal-body { flex: 1; overflow-y: auto; }

    /* BOOK */
    .book-page { padding: 22px 26px 14px; }
    .book-label {
      font-family: 'Bangers', sans-serif;
      font-size: 12px; letter-spacing: 2px;
      color: #888; margin-bottom: 4px;
    }
    .book-title {
      font-family: 'Bangers', sans-serif;
      font-size: 28px; letter-spacing: 2px;
      color: #111; margin-bottom: 12px;
      text-transform: uppercase;
    }
    .book-body { font-size: 13px; color: #333; line-height: 1.75; }
    .book-img {
      width: 100%; margin: 14px 0;
      border: 2px solid #111;
      display: block;
      object-fit: cover;
      max-height: 260px;
    }
    .book-placeholder {
      width: 100%; height: 120px; margin: 14px 0;
      background: repeating-linear-gradient(45deg,#e0dbd0,#e0dbd0 3px,#f0ece4 3px,#f0ece4 10px);
      border: 2px solid #111;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bangers', sans-serif;
      font-size: 12px; color: #777; letter-spacing: 1px;
    }
    .book-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 18px; border-top: 2px solid #111; flex-shrink: 0;
    }
    .bnav-btn {
      font-family: 'Bangers', sans-serif; font-size: 15px; letter-spacing: 1px;
      border: 2px solid #111; background: #f8f5ee; color: #111;
      padding: 4px 16px; cursor: pointer; text-transform: uppercase;
    }
    .bnav-btn:hover { background: #111; color: #f0ece4; }
    .bnav-btn:disabled { opacity: 0.22; cursor: default; background: #f8f5ee; color: #111; }
    .page-counter { font-family: 'Bangers', sans-serif; font-size: 14px; color: #666; letter-spacing: 1px; }

    /* PHONE / TIKTOK */
    .phone-wrap {
      background: #111; padding: 28px 16px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .phone-frame {
      width: 215px; border: 4px solid #2a2a2a; border-radius: 30px;
      background: #1a1a1a; padding: 10px 6px;
    }
    .phone-notch {
      width: 58px; height: 10px; background: #2a2a2a;
      border-radius: 0 0 8px 8px; margin: 0 auto 6px;
    }
    .phone-screen {
      background: #000; border-radius: 16px;
      overflow: hidden; height: 360px; position: relative;
    }
    .phone-screen iframe { width: 100%; height: 360px; border: none; }
    .phone-swipe { display: flex; gap: 14px; align-items: center; }
    .swipe-btn {
      font-family: 'Bangers', sans-serif; font-size: 14px; letter-spacing: 1px;
      border: 2px solid #444; background: transparent; color: #888;
      padding: 4px 16px; cursor: pointer; border-radius: 4px;
    }
    .swipe-btn:hover { border-color: #f0ece4; color: #f0ece4; }
    .swipe-btn:disabled { opacity: 0.22; cursor: default; }
    .vid-counter { font-family: 'Bangers', sans-serif; font-size: 14px; color: #555; letter-spacing: 1px; }

    /* GALLERY */
    .gallery-wrap {
      padding: 28px 20px;
      background: #f8f5ee;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }
    .stack-container {
      position: relative; width: 280px; height: 220px;
    }
    .stack-sheet {
      position: absolute; inset: 0;
      border: 2.5px solid #111; background: #f8f5ee;
      overflow: hidden;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }
    .stack-sheet img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .stack-sheet-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #111; color: #f0ece4;
      font-family: 'Bangers', sans-serif;
      font-size: 13px; letter-spacing: 1px;
      padding: 5px 12px;
    }
    .stack-sheet-ph {
      width: 100%; height: 100%;
      background: repeating-linear-gradient(45deg,#e0dbd0,#e0dbd0 3px,#f8f5ee 3px,#f8f5ee 10px);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bangers', sans-serif; font-size: 12px; color: #888; letter-spacing: 1px;
    }

    /* ABOUT */
    .about-wrap { padding: 22px 26px; }
    .about-title {
      font-family: 'Bangers', sans-serif; font-size: 30px;
      letter-spacing: 3px; color: #111; margin-bottom: 14px;
    }
    .about-body { font-size: 13px; color: #333; line-height: 1.8; }
    .about-tag {
      display: inline-block; border: 2px solid #111;
      font-family: 'Bangers', sans-serif; font-size: 12px;
      padding: 2px 10px; margin: 6px 4px 0 0; letter-spacing: 1px;
    }

    /* FOOTER */
    .footer {
      background: #111; color: #666;
      font-family: 'Bangers', sans-serif;
      font-size: 13px; letter-spacing: 2px;
      text-align: center; padding: 10px;
      max-width: 900px; margin: 0 auto;
      border: 3px solid #111; border-top: none;
    }
  </style>
</head>

<script>
const fanzines = [
  {
    label: "Fanzine 1 / 3", title: "Fanzine #1",
    ph: "[ Couverture — encre de chine, A4 ]",
    body: "Décris ton premier fanzine ici — nombre de pages, technique, tirage, distribution..."
  },
  {
    label: "Fanzine 2 / 3", title: "Fanzine #2",
    ph: "[ Double page intérieure ]",
    body: "Décris ton deuxième fanzine ici."
  },
  {
    label: "Fanzine 3 / 3", title: "Fanzine #3",
    ph: "[ Planche ]",
    body: "Décris ton troisième fanzine ici."
  }
];

const videos = [
  { id: "7606630879707843862" },
  { id: "7606255381228031254" },
  { id: "7608205217351585027" }
];

const gallery = [
  { src: "images/Carnet-Rouge-67.jpeg", label: "Carnet Rouge — 67" },
  { src: "images/Carnet-Rouge-68.jpeg", label: "Carnet Rouge — 68" },
  { src: "images/Carnet-Rouge-69.jpeg", label: "Carnet Rouge — 69" },
  { src: "images/Carnet-Rouge-70.jpeg", label: "Carnet Rouge — 70" },
  { src: "images/Carnet-Rouge-71.jpeg", label: "Carnet Rouge — 71" },
  { src: "images/Carnet-Rouge-72.jpeg", label: "Carnet Rouge — 72" }
];

const about = [
  {
    label: "Profil", title: "Vésanerie",
    body: "Dessinateur, vidéaste et auto-éditeur. Je crée des fanzines à tirage limité, des illustrations à l'encre de Chine, et je monte des vidéos qui documentent mon processus créatif."
  },
  {
    label: "Pratique", title: "Ce que je fais",
    body: "Dessin — encre de Chine, aquarelle, crayon\nFanzines & auto-édition — de la maquette à l'impression\nMontage vidéo — tournage, narration, post-prod\nDirection artistique — identité visuelle, mise en page"
  },
  {
    label: "Contact", title: "Travaillons ensemble",
    body: "Disponible pour commandes d'illustrations, couvertures, identités visuelles et projets éditoriaux.\n\nTikTok : @culture.hot.mag\nSite : vesanerie.fr"
  }
];

let mode = '', page = 0, vidIdx = 0, imgIdx = 0;

function openModal(m) {
  mode = m; page = 0; vidIdx = 0; imgIdx = 0;
  render();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeIfBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function render() {
  if (mode === 'fanzines') renderBook(fanzines, 'Fanzines');
  else if (mode === 'videos') renderVideos();
  else if (mode === 'galerie') renderGallery();
  else if (mode === 'about') renderBook(about, 'A propos');
}

function renderBook(data, title) {
  document.getElementById('modal-title').textContent = title.toUpperCase();
  const p = data[page];
  const imgHtml = p.src
    ? `<img class="book-img" src="${p.src}" alt="${p.label || p.title}">`
    : p.ph ? `<div class="book-placeholder">${p.ph}</div>` : '';
  document.getElementById('modal-body').innerHTML = `
    <div class="book-page">
      <div class="book-label">${p.label || ''}</div>
      <div class="book-title">${p.title}</div>
      ${imgHtml}
      <div class="book-body">${p.body.replace(/\n/g, '<br>')}</div>
    </div>
    <div class="book-nav">
      <button class="bnav-btn" onclick="bp(-1)" ${page===0?'disabled':''}>← Préc.</button>
      <span class="page-counter">${page+1} / ${data.length}</span>
      <button class="bnav-btn" onclick="bp(1)" ${page===data.length-1?'disabled':''}>Suiv. →</button>
    </div>`;
}
function bp(d) {
  const data = mode === 'fanzines' ? fanzines : about;
  page = Math.max(0, Math.min(data.length-1, page+d));
  renderBook(data, mode === 'fanzines' ? 'Fanzines' : 'A propos');
}

function renderVideos() {
  document.getElementById('modal-title').textContent = 'TIKTOK';
  const v = videos[vidIdx];
  document.getElementById('modal-body').innerHTML = `
    <div class="phone-wrap">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <iframe src="https://www.tiktok.com/embed/v2/${v.id}"
            allowfullscreen allow="encrypted-media autoplay"></iframe>
        </div>
      </div>
      <div class="phone-swipe">
        <button class="swipe-btn" onclick="sv(-1)" ${vidIdx===0?'disabled':''}>↑ Préc</button>
        <span class="vid-counter">${vidIdx+1} / ${videos.length}</span>
        <button class="swipe-btn" onclick="sv(1)" ${vidIdx===videos.length-1?'disabled':''}>Suiv ↓</button>
      </div>
    </div>`;
}
function sv(d) {
  vidIdx = Math.max(0, Math.min(videos.length-1, vidIdx+d));
  renderVideos();
}

function renderGallery() {
  document.getElementById('modal-title').textContent = 'GALERIE';
  const rots = [-7, -3, 1, -5, 4, -2];
  let sheets = '';
  for (let i = gallery.length - 1; i >= 0; i--) {
    const isTop = i === imgIdx;
    const r = isTop ? 0 : rots[i % rots.length];
    const sc = isTop ? 1 : 0.92;
    const op = isTop ? 1 : 0.65;
    sheets += `<div class="stack-sheet" style="transform:rotate(${r}deg) scale(${sc});opacity:${op};z-index:${isTop?10:i};">
      ${isTop
        ? `<img src="${gallery[i].src}" alt="${gallery[i].label}" style="width:100%;height:100%;object-fit:cover;display:block;">`
        : `<div class="stack-sheet-ph"></div>`
      }
      ${isTop ? `<div class="stack-sheet-label">${gallery[i].label}</div>` : ''}
    </div>`;
  }
  document.getElementById('modal-body').innerHTML = `
    <div class="gallery-wrap">
      <div class="stack-container">${sheets}</div>
      <div class="book-nav" style="width:100%;border-top:2px solid #111;margin-top:4px;">
        <button class="bnav-btn" onclick="gi(-1)" ${imgIdx===0?'disabled':''}>← Préc.</button>
        <span class="page-counter">${imgIdx+1} / ${gallery.length}</span>
        <button class="bnav-btn" onclick="gi(1)" ${imgIdx===gallery.length-1?'disabled':''}>Suiv. →</button>
      </div>
    </div>`;
}
function gi(d) {
  imgIdx = Math.max(0, Math.min(gallery.length-1, imgIdx+d));
  renderGallery();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowRight') {
    if (mode === 'fanzines') bp(1);
    else if (mode === 'galerie') gi(1);
    else if (mode === 'about') bp(1);
    else if (mode === 'videos') sv(1);
  }
  if (e.key === 'ArrowLeft') {
    if (mode === 'fanzines') bp(-1);
    else if (mode === 'galerie') gi(-1);
    else if (mode === 'about') bp(-1);
    else if (mode === 'videos') sv(-1);
  }
});
</script>
</body>
</html>
