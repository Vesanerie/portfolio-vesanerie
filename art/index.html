<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../favicon.png">
  <title>Vesanerie — Art</title>
  <meta name="description" content="Portfolio art de Valentin Mardoukhaev — Fanzines, bande dessinee, illustration, graphisme.">
  <meta property="og:title" content="Vesanerie — Art">
  <meta property="og:description" content="Portfolio art de Valentin Mardoukhaev — Fanzines, bande dessinee, illustration, graphisme.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/art.css">
  <link rel="stylesheet" href="../css/pdf-viewer.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha512-q+4liFwdPC/bNdhUpZx6aXDx/h77yEQtn4I1slHydcbZK34nLaR3cAeYSJshoxIOq3mjEf7xJE8YWIUHMn+oCQ==" crossorigin="anonymous"></script>
</head>
<body>

  <button class="theme-toggle" aria-label="Changer le theme" onclick="toggleTheme()">
    <div class="dot"></div>
  </button>

  <a href="../" class="back-link" id="back-link">&larr; Retour</a>

  <!-- ===== VUE PILE ===== -->
  <div class="pile-view" id="pile-view">
    <div class="pile-header">
      <div class="pile-title">Art</div>
      <div class="pile-sub">Choisis un projet</div>
    </div>

    <div class="pile-stack" id="pile-stack">

      <button class="pile-book pile-lg" data-folder="edition" style="--rot: -3deg; --ox: 0px; --oy: 8px;">
        <div class="pile-book-title">&Eacute;dition</div>
        <div class="pile-book-type">Fanzines &amp; Zines</div>
      </button>

      <button class="pile-book pile-lg" data-folder="graphisme" style="--rot: 2deg; --ox: 0px; --oy: -12px;">
        <div class="pile-book-title">Graphisme</div>
        <div class="pile-book-type">Identit&eacute;s &amp; illustrations</div>
      </button>

      <button class="pile-folder" data-folder="illustration" style="--rot: -2deg; --ox: 0px; --oy: 12px;">
        <div class="folder-tab">Illustration</div>
        <div class="folder-body"></div>
      </button>

      <button class="pile-phone" data-folder="tiktoks" style="--rot: 3deg; --ox: 0px; --oy: -10px;">
        <div class="phone-notch"></div>
        <div class="phone-screen-label">Vid&eacute;o</div>
        <div class="phone-sub-label">TikToks &amp; films</div>
        <div class="phone-home-bar"></div>
      </button>

    </div>
  </div>

  <!-- ===== VUE EDITION ===== -->
  <div class="pile-view hidden" id="edition-view">
    <div class="pile-header">
      <div class="pile-title">&Eacute;dition</div>
      <div class="pile-sub">Fanzines &amp; Zines</div>
    </div>
    <div class="pile-stack">
      <button class="pile-book pile-lg" data-book="memoire-clown" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/M%C3%A9moire%20clown%20final%203.pdf" style="--rot: -2deg; --ox: 0px; --oy: 8px;">
        <div class="pile-book-icon">&#9790;</div>
        <div class="pile-book-title">M&eacute;moire Clown</div>
        <div class="pile-book-type">M&eacute;moire PDF</div>
      </button>
      <button class="pile-book pile-md" data-book="random-zine" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Random%20Zine%202.pdf" style="--rot: -3deg; --ox: 0px; --oy: -10px;">
        <div class="pile-book-icon">&#9790;</div>
        <div class="pile-book-title">Random Zine</div>
        <div class="pile-book-type">Fanzine PDF</div>
      </button>
      <button class="pile-book pile-md" data-book="spirale-sket-tour" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/SPIRALE%20Sket%20tour.pdf" data-single="true" style="--rot: 2deg; --ox: 0px; --oy: -15px;">
        <div class="pile-book-icon">&#9724;</div>
        <div class="pile-book-title">Spirale Sket Tour</div>
        <div class="pile-book-type">Fanzine PDF</div>
      </button>
      <button class="pile-book pile-sm" data-book="sauce" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Sauce%20Fanzine.pdf" style="--rot: 3deg; --ox: 0px; --oy: -10px;">
        <div class="pile-book-icon">&#9790;</div>
        <div class="pile-book-title">Sauce</div>
        <div class="pile-book-type">Fanzine PDF</div>
      </button>
    </div>
  </div>

  <!-- ===== VUE ILLUSTRATION ===== -->
  <div class="pile-view hidden" id="illustration-view">
    <div class="pile-header">
      <div class="pile-title">Illustration</div>
      <div class="pile-sub">Dessins &amp; illustrations</div>
    </div>
    <div class="pile-stack">
      <button class="pile-book pile-wide" data-book="voiture" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/VOITURE.pdf" data-single="true" style="--rot: -2deg; --ox: 0px; --oy: 10px;">
        <div class="pile-book-icon">&#9724;</div>
        <div class="pile-book-title">Voiture</div>
        <div class="pile-book-type">Fanzine PDF</div>
      </button>
    </div>
  </div>

  <!-- ===== VUE GRAPHISME ===== -->
  <div class="pile-view hidden" id="graphisme-view">
    <div class="pile-header">
      <div class="pile-title">Graphisme</div>
      <div class="pile-sub">Identit&eacute;s &amp; illustrations</div>
    </div>
    <div class="pile-stack">
      <button class="pile-book pile-lg has-cover" data-folder="esport" style="--rot: -2deg; --ox: 0px; --oy: 8px; background-image: url('https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Jersey_presentation_exo%20carr%C3%A9.png'); background-size: cover; background-position: center;">
        <div class="pile-book-title">Esport Team</div>
        <div class="pile-book-type">Identit&eacute; visuelle</div>
      </button>

      <button class="pile-book pile-md has-cover" data-book="magnificat" data-img="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Magnificat%20Reloaded.jpg" style="--rot: -2deg; --ox: 0px; --oy: 10px; background-image: url('https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Magnificat%20Reloaded.jpg'); background-size: cover; background-position: center;">
        <div class="pile-book-title">Magnificat</div>
        <div class="pile-book-type">Cover d'album</div>
      </button>

      <button class="pile-book pile-md has-cover" data-book="flyer-perth" data-img="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Flyer%20Perth%20Draw%20Club%20Call%20For%20Artists%20V6.jpg" style="--rot: 2deg; --ox: 0px; --oy: -10px; background-image: url('https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Flyer%20Perth%20Draw%20Club%20Call%20For%20Artists%20V6.jpg'); background-size: cover; background-position: center;">
        <div class="pile-book-title">Flyer Perth Draw Club</div>
        <div class="pile-book-type">Affiche</div>
      </button>

      <button class="pile-book pile-wide" data-book="rk-brand" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/RK_Final_Brand_Concept.pdf" data-single="true" style="--rot: -2deg; --ox: 0px; --oy: 10px;">
        <div class="pile-book-icon">&#10022;</div>
        <div class="pile-book-title">RK Brand Concept</div>
        <div class="pile-book-type">Identit&eacute; visuelle</div>
      </button>
      <button class="pile-book pile-md" data-folder="carnets" data-cover-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Carnet%20De%20recherche%20ROSE.pdf" style="--rot: 3deg; --ox: 0px; --oy: -8px;">
        <div class="pile-book-icon">&#9998;</div>
        <div class="pile-book-title">Carnets</div>
        <div class="pile-book-type">3 carnets</div>
      </button>
    </div>
  </div>

  <!-- ===== VUE ESPORT ===== -->
  <div class="pile-view hidden" id="esport-view">
    <div class="pile-header">
      <div class="pile-title">Esport Team</div>
      <div class="pile-sub">Identit&eacute; visuelle</div>
    </div>
    <div class="gallery-grid">
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Exo%20Visu.png" alt="Exo Visu" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Jersey_presentation_exo%20carr%C3%A9.png" alt="Jersey presentation carre" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Jersey_presentation_exo.png" alt="Jersey presentation" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Maillot_fruit_exo.png" alt="Maillot fruit" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/fiche%20joueur_exo.png" alt="Fiche joueur" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Maillot_Back_exo.png" alt="Maillot Back" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Test%201_exo.png" alt="Test 1" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Test%202_exo.png" alt="Test 2" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Test%203_exo.png" alt="Test 3" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Test%204_exo.png" alt="Test 4" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Test%205_exo.png" alt="Test 5" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Esport%20Team/Test%206_exo.png" alt="Test 6" loading="lazy">
      </div>
    </div>
  </div>

  <!-- ===== VUE TIKTOKS ===== -->
  <div class="pile-view hidden" id="tiktoks-view">
    <div class="pile-header">
      <div class="pile-title">TikToks</div>
      <div class="pile-sub">@culture.hot.mag</div>
    </div>
    <div class="tiktok-row">
      <div class="tiktok-phone">
        <div class="tiktok-phone-notch"></div>
        <div class="tiktok-scroll">
          <div class="tiktok-embed-wrap">
            <iframe src="https://www.tiktok.com/embed/v2/7610068718210583830" title="Video TikTok 1" allowfullscreen allow="encrypted-media"></iframe>
          </div>
          <div class="tiktok-embed-wrap">
            <iframe src="https://www.tiktok.com/embed/v2/7608205217351585027" title="Video TikTok 2" allowfullscreen allow="encrypted-media"></iframe>
          </div>
          <div class="tiktok-embed-wrap">
            <iframe src="https://www.tiktok.com/embed/v2/7606630879707843862" title="Video TikTok 3" allowfullscreen allow="encrypted-media"></iframe>
          </div>
          <div class="tiktok-embed-wrap">
            <iframe src="https://www.tiktok.com/embed/v2/7606255381228031254" title="Video TikTok 4" allowfullscreen allow="encrypted-media"></iframe>
          </div>
        </div>
        <div class="tiktok-phone-home"></div>
      </div>
      <div class="tiktok-nav-arrows">
        <button class="tiktok-arrow" id="tiktok-up" aria-label="Video precedente">&#8593;</button>
        <div class="tiktok-counter" id="tiktok-counter">1 / 4</div>
        <button class="tiktok-arrow" id="tiktok-down" aria-label="Video suivante">&#8595;</button>
      </div>
    </div>
  </div>

  <!-- ===== VUE SOUS-PILE CARNETS ===== -->
  <div class="pile-view hidden" id="carnets-view">
    <div class="pile-header">
      <div class="pile-title">Carnets</div>
      <div class="pile-sub">Choisis un carnet</div>
    </div>
    <div class="pile-stack">
      <button class="pile-book" data-book="carnet-rose" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Carnet%20De%20recherche%20ROSE.pdf" style="--rot: -5deg; --ox: 15px; --oy: 12px;">
        <div class="pile-book-icon">&#9998;</div>
        <div class="pile-book-title">Carnet de Recherche Rose</div>
        <div class="pile-book-type">Carnet PDF</div>
      </button>
      <button class="pile-book" data-book="carnet-rouge" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Carnet%20Rouge%203.pdf" style="--rot: 4deg; --ox: -20px; --oy: -10px;">
        <div class="pile-book-icon">&#9998;</div>
        <div class="pile-book-title">Carnet Rouge</div>
        <div class="pile-book-type">Carnet PDF</div>
      </button>
      <button class="pile-book" data-book="carnet-jaune" data-pdf="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Carnet%20de%20Recherche%20JAUNE.pdf" data-single="true" style="--rot: 5deg; --ox: -14px; --oy: -6px;">
        <div class="pile-book-icon">&#9998;</div>
        <div class="pile-book-title">Carnet de Recherche Jaune</div>
        <div class="pile-book-type">Carnet PDF</div>
      </button>
    </div>
  </div>

  <!-- ===== VUE PDF ===== -->
  <div class="book-view hidden" id="book-view">
    <div id="pdf-container" class="book-viewer" style="display:none;"></div>
  </div>

  <!-- Lightbox -->
  <div class="gallery-lightbox" id="lightbox" onclick="this.classList.remove('open')">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/art.js"></script>
</body>
</html>
