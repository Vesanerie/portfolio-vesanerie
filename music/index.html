  <meta property="og:title" content="Valentin Mardoukhaev — Musique">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/music.css">
</head>
<body>

  <button class="theme-toggle" aria-label="Changer le theme" onclick="toggleTheme()">
    <div class="dot"></div>
  </button>

  <a href="../" class="back-link">&larr; Accueil</a>

  <div class="music-page">
    <div class="ipod">
      <div class="ipod-screen">
        <div class="ipod-header">iPod</div>
        <div class="ipod-now-playing" id="now-playing">Choisis un morceau</div>
        <div class="ipod-list" id="track-list">
          <button class="ipod-track" data-src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Musique/SANGANT%202.mp3" data-title="SANGANT 2">
            <span class="track-num">1</span>
            <span class="track-name">SANGANT 2 (Rap, 2024)</span>
          </button>
          <button class="ipod-track" data-src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Musique/regarde%20le%20monde%20bruler.mp3" data-title="Regarde le monde bruler">
            <span class="track-num">2</span>
            <span class="track-name">Regarde le monde bruler (Film, 2024)</span>
          </button>
          <button class="ipod-track" data-src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Musique/spider%20man%20V7.mp3" data-title="Spider Man V7">
            <span class="track-num">3</span>
            <span class="track-name">Spider Man V7 (Rap, 2024)</span>
          </button>
          <button class="ipod-track" data-src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Musique/Dans%20les%20%C3%A9toiles%20Vesanerie%20V2.mp3" data-title="Dans les etoiles Vesanerie V2">
            <span class="track-num">4</span>
            <span class="track-name">Dans les etoiles Vesanerie V2</span>
          </button>
          <button class="ipod-track" data-src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Musique/Infamous%20V4.mp3" data-title="Infamous V4">
            <span class="track-num">5</span>
            <span class="track-name">Infamous V4</span>
          </button>
          <button class="ipod-track" data-src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Musique/PROD%20PROJ%20ORIENT%3F_1.mp3" data-title="PROD PROJ ORIENT?">
            <span class="track-num">6</span>
            <span class="track-name">PROD PROJ ORIENT?</span>
          </button>
          <button class="ipod-track" data-src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Art/Musique/maquette%20son%20joie%20de%20vivre.mp3" data-title="Maquette son joie de vivre">
            <span class="track-num">7</span>
            <span class="track-name">Maquette son joie de vivre</span>
          </button>
        </div>
        <div class="ipod-progress">
          <div class="ipod-progress-bar" id="progress-bar"></div>
        </div>
        <div class="ipod-time">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>
      <div class="ipod-wheel">
        <div class="ipod-wheel-ring">
          <div class="ipod-wheel-label top">MENU</div>
          <div class="ipod-wheel-label right">&#9654;&#9654;</div>
          <div class="ipod-wheel-label bottom">&#9646;&#9646;</div>
          <div class="ipod-wheel-label left">&#9664;&#9664;</div>
          <button class="ipod-wheel-center" id="play-btn" aria-label="Play/Pause"></button>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio-player"></audio>

  <button class="tools-trigger" aria-label="Outils" onclick="document.querySelector('.tools-card').classList.add('open')"><img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Logo.png" alt="" class="tools-trigger-icon"></button>
  <button class="tools-card" onclick="this.classList.toggle('open')" aria-label="Outils">
    <div class="tools-card-label"><img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Logo.png" alt="" class="card-logo">Outils</div>
    <div class="tools-card-content">
      <div class="tools-item">Logic Pro</div>
    </div>
  </button>

  <script src="../js/main.js"></script>
  <script src="../js/music.js"></script>
