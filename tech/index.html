<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vesanerie — Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tech.css">
</head>
<body>

  <div class="theme-toggle" onclick="toggleTheme()">
    <div class="dot"></div>
  </div>

  <a href="../" class="back-link">&larr; Retour</a>

  <div class="tech-page">

    <div class="laptop">
      <!-- Écran -->
      <div class="laptop-bezel">
        <div class="laptop-cam"></div>
        <div class="laptop-screen">
          <div class="screen-topbar">
            <span class="topbar-dots">
              <span class="tb-dot tb-red"></span>
              <span class="tb-dot tb-yellow"></span>
              <span class="tb-dot tb-green"></span>
            </span>
            <span class="topbar-title">vesanerie://projets</span>
          </div>

          <div class="desktop-grid">
            <button class="app-icon" data-app="0">
              <div class="app-icon-img">&#128187;</div>
              <div class="app-icon-name">PortfolioGen</div>
            </button>

            <button class="app-icon" data-app="1">
              <div class="app-icon-img">&#129302;</div>
              <div class="app-icon-name">ChatBot IA</div>
            </button>

            <button class="app-icon" data-app="2">
              <div class="app-icon-img">&#128202;</div>
              <div class="app-icon-name">DataViz</div>
            </button>

            <button class="app-icon" data-app="3">
              <div class="app-icon-img">&#127912;</div>
              <div class="app-icon-name">PixelForge</div>
            </button>

            <button class="app-icon" data-app="4">
              <div class="app-icon-img">&#128268;</div>
              <div class="app-icon-name">API Toolkit</div>
            </button>

            <button class="app-icon" data-app="5">
              <div class="app-icon-img">&#128196;</div>
              <div class="app-icon-name">DocParser</div>
            </button>
          </div>
        </div>
      </div>

      <!-- Charnière -->
      <div class="laptop-hinge"></div>

      <!-- Base avec clavier -->
      <div class="laptop-body">
        <div class="keyboard">
          <div class="kb-row">
            <span class="key key-sm">esc</span>
            <span class="key key-sm">F1</span>
            <span class="key key-sm">F2</span>
            <span class="key key-sm">F3</span>
            <span class="key key-sm">F4</span>
            <span class="key key-sm">F5</span>
            <span class="key key-sm">F6</span>
            <span class="key key-sm">F7</span>
            <span class="key key-sm">F8</span>
            <span class="key key-sm">F9</span>
            <span class="key key-sm">F10</span>
            <span class="key key-sm">F11</span>
            <span class="key key-sm">F12</span>
          </div>
          <div class="kb-row">
            <span class="key">`</span>
            <span class="key">1</span>
            <span class="key">2</span>
            <span class="key">3</span>
            <span class="key">4</span>
            <span class="key">5</span>
            <span class="key">6</span>
            <span class="key">7</span>
            <span class="key">8</span>
            <span class="key">9</span>
            <span class="key">0</span>
            <span class="key">-</span>
            <span class="key">=</span>
            <span class="key key-w2">&#9003;</span>
          </div>
          <div class="kb-row">
            <span class="key key-w15">tab</span>
            <span class="key">Q</span>
            <span class="key">W</span>
            <span class="key">E</span>
            <span class="key">R</span>
            <span class="key">T</span>
            <span class="key">Y</span>
            <span class="key">U</span>
            <span class="key">I</span>
            <span class="key">O</span>
            <span class="key">P</span>
            <span class="key">[</span>
            <span class="key">]</span>
            <span class="key key-w15">\</span>
          </div>
          <div class="kb-row">
            <span class="key key-w175">caps</span>
            <span class="key">A</span>
            <span class="key">S</span>
            <span class="key">D</span>
            <span class="key">F</span>
            <span class="key">G</span>
            <span class="key">H</span>
            <span class="key">J</span>
            <span class="key">K</span>
            <span class="key">L</span>
            <span class="key">;</span>
            <span class="key">'</span>
            <span class="key key-w225">&#9166;</span>
          </div>
          <div class="kb-row">
            <span class="key key-w225">&#8679;</span>
            <span class="key">Z</span>
            <span class="key">X</span>
            <span class="key">C</span>
            <span class="key">V</span>
            <span class="key">B</span>
            <span class="key">N</span>
            <span class="key">M</span>
            <span class="key">,</span>
            <span class="key">.</span>
            <span class="key">/</span>
            <span class="key key-w275">&#8679;</span>
          </div>
          <div class="kb-row">
            <span class="key key-w125">fn</span>
            <span class="key key-w125">ctrl</span>
            <span class="key key-w125">alt</span>
            <span class="key key-w15">&#8984;</span>
            <span class="key key-space"></span>
            <span class="key key-w15">&#8984;</span>
            <span class="key key-w125">alt</span>
            <span class="key key-sm">&#9664;</span>
            <span class="key key-sm-v">&#9650;<br>&#9660;</span>
            <span class="key key-sm">&#9654;</span>
          </div>
        </div>
        <div class="trackpad"></div>
      </div>
    </div>

  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-window">
      <div class="modal-topbar">
        <span class="topbar-dots">
          <span class="tb-dot tb-red"></span>
          <span class="tb-dot tb-yellow"></span>
          <span class="tb-dot tb-green"></span>
        </span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-icon" id="modal-icon"></div>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-desc" id="modal-desc"></p>
        <div class="modal-tags" id="modal-tags"></div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/tech.js"></script>
</body>
</html>
