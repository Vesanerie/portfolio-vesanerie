<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Logo.png">
  <title>Vesanerie — Tech</title>
  <meta name="description" content="Projets tech de Valentin Mardoukhaev — Developpement, IA, outils.">
  <meta property="og:title" content="Vesanerie — Tech">
  <meta property="og:description" content="Projets tech de Valentin Mardoukhaev — Developpement, IA, outils.">
  <meta property="og:image" content="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Vesanerie_portfolio.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="../css/style.css">

</head>
<body>

  <button class="theme-toggle" aria-label="Changer le theme" onclick="toggleTheme()">
    <div class="dot"></div>
  </button>

  <nav class="breadcrumb">
    <a href="../">Accueil</a>
    <span class="bc-sep">/</span>
    <span class="bc-current">Tech</span>
  </nav>

  <div class="tech-page">
    <div class="laptop">

      <!-- Écran -->
      <div class="screen-shell">
        <div class="screen-inner">

          <!-- Bureau -->
          <div class="desktop" id="desktop">
            <button class="app-icon" data-url="https://gesturo.fr/">
              <div class="app-icon-img">&#9998;</div>
              <div class="app-icon-name">Gesturo</div>
            </button>
            <button class="app-icon" data-url="https://gesturo-imagegen.pages.dev/">
              <div class="app-icon-img">&#9881;</div>
              <div class="app-icon-name">ImageGen</div>
            </button>
            <button class="app-icon" data-url="https://gesturo.fr/Vidtojpeg/">
              <div class="app-icon-img">&#9654;</div>
              <div class="app-icon-name">VidToJpeg</div>
            </button>
            <button class="app-icon" data-url="https://gesturo.fr/Pdfdecompil/">
              <div class="app-icon-img">&#9776;</div>
              <div class="app-icon-name">PdfDecompil</div>
            </button>
            <button class="app-icon" data-url="https://gesturo.fr/vectorio/">
              <div class="app-icon-img">&#9674;</div>
              <div class="app-icon-name">Vectorio</div>
            </button>
            <div class="app-desc" id="app-desc"></div>
          </div>

          <!-- Vue site (cachée par défaut) -->
          <div class="site-view hidden" id="site-view">
            <div class="site-topbar">
              <button class="site-back" id="site-back">&larr;</button>
              <span class="site-url" id="site-url"></span>
            </div>
            <iframe class="site-iframe" id="site-iframe" title="Projet"></iframe>
          </div>

        </div>
      </div>

      <!-- Base clavier -->
      <div class="base-shell">
        <div class="keyboard">
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
        </div>
        <div class="trackpad"></div>
      </div>

    </div>
  </div>

  <button class="tools-card" onclick="this.classList.toggle('open')" aria-label="Outils">
    <div class="tools-card-label"><img src="https://pub-43a141f7a8b84a30a90fcc01da2114ca.r2.dev/Logo.png" alt="" class="card-logo">Outils</div>
    <div class="tools-card-content">
      <div class="tools-item">VS Code</div>
      <div class="tools-item">Claude Code</div>
      <div class="tools-item">React</div>
      <div class="tools-item">Node.js</div>
    </div>
  </button>

  <script src="../js/main.js"></script>
  <script src="../js/tech.js"></script>
</body>
</html>
