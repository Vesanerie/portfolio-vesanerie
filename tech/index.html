<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../favicon.png">
  <title>Vesanerie — Tech</title>
  <meta name="description" content="Projets tech de Valentin Mardoukhaev — Developpement, IA, outils.">
  <meta property="og:title" content="Vesanerie — Tech">
  <meta property="og:description" content="Projets tech de Valentin Mardoukhaev — Developpement, IA, outils.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tech.css">
</head>
<body>

  <button class="theme-toggle" aria-label="Changer le theme" onclick="toggleTheme()">
    <div class="dot"></div>
  </button>

  <a href="../" class="back-link">&larr; Retour</a>

  <div class="tech-page">
    <div class="laptop">

      <!-- Écran -->
      <div class="screen-shell">
        <div class="screen-inner">

          <!-- Bureau -->
          <div class="desktop" id="desktop">
            <button class="app-icon" data-url="https://gesturo.fr/">
              <div class="app-icon-img">&#9998;</div>
              <div class="app-icon-name">Gesturo</div>
            </button>
          </div>

          <!-- Vue site (cachée par défaut) -->
          <div class="site-view hidden" id="site-view">
            <div class="site-topbar">
              <button class="site-back" id="site-back">&larr;</button>
              <span class="site-url" id="site-url"></span>
            </div>
            <iframe class="site-iframe" id="site-iframe" title="Projet"></iframe>
          </div>

        </div>
      </div>

      <!-- Base clavier -->
      <div class="base-shell">
        <div class="keyboard">
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
        </div>
        <div class="trackpad"></div>
      </div>

    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/tech.js"></script>
</body>
</html>
