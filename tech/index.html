<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Vesanerie — Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tech.css">
</head>
<body>

  <div class="theme-toggle" onclick="toggleTheme()">
    <div class="dot"></div>
  </div>

  <a href="../" class="back-link">&larr; Retour</a>

  <div class="tech-page">
    <div class="laptop">

      <!-- Écran -->
      <div class="screen-shell">
        <div class="screen-inner">
          <iframe src="https://gesturo.fr/" class="screen-iframe" title="Gesturo"></iframe>
        </div>
      </div>

      <!-- Base clavier -->
      <div class="base-shell">
        <div class="keyboard">
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>

          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>

          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
          <div class="kb-row">
            <span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span>
          </div>
        </div>
        <div class="trackpad"></div>
      </div>

    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
